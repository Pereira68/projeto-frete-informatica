<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Frete - Informática</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
        h2 { color: #333; text-align: center; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; margin-top: 20px; cursor: pointer; font-size: 16px; }
        button:hover { background: #218838; }
        #resultado { margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 5px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Simulador de Frete</h2>
    
    <label for="cep">CEP de Destino:</label>
    <input type="text" id="cep" placeholder="00000-000">

    <label for="peso">Peso da Carga (kg):</label>
    <input type="number" id="peso" placeholder="Ex: 5">

    <button onclick="calcularFrete()">Calcular Frete</button>

    <div id="resultado"></div>
</div>

<script>
    function calcularFrete() {
        const peso = document.getElementById('peso').value;
        const resDiv = document.getElementById('resultado');
        
        if(peso > 0) {
            // Lógica simples de cálculo: R$ 15,00 fixo + R$ 2,50 por kg
            const valor = 15 + (peso * 2.50);
            resDiv.style.display = 'block';
            resDiv.innerHTML = <strong>Resultado:</strong><br>O valor estimado do frete é: R$ ${valor.toFixed(2)};
        } else {
            alert("Por favor, insira um peso válido.");
        }
    }
</script>

</body>
</html>
