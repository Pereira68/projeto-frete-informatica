<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Frete</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
        h2 { color: #333; text-align: center; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; margin-top: 20px; cursor: pointer; font-size: 16px; }
        #resultado { margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 5px; display: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Simulador de Frete</h2>
        <label>CEP de Destino:</label>
        <input type="text" id="cep" placeholder="00000-000">
        <label>Peso da Carga (kg):</label>
        <input type="number" id="peso" placeholder="Ex: 10">
        <button onclick="calcular()">Calcular Frete</button>
        <div id="resultado"></div>
    </div>
    <script>
        function calcular() {
            const peso = document.getElementById('peso').value;
            const res = document.getElementById('resultado');
            if (peso > 0) {
                const total = 15 + (peso * 2.50);
                res.style.display = 'block';
                res.innerHTML = "O valor do frete é: R$ " + total.toFixed(2);
            } else {
                alert("Por favor, digite o peso.");
            }
        }
    </script>
</body>
</html>
