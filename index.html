<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta de CEP com Frete</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 30px;
    }

    .container {
      max-width: 500px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin: auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      color: #333;
    }

    label, input, button {
      display: block;
      width: 100%;
      margin-bottom: 12px;
    }

    input {
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px;
      background: #0077cc;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 6px;
    }

    button:hover {
      background: #005fa3;
    }

    .resultado {
      margin-top: 20px;
      padding: 15px;
      background: #eef6ff;
      border-radius: 8px;
    }

    .erro {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Consulta de CEP</h1>

    <!-- INTERFACE PROVEDORA -->
    <label for="cep">Digite o CEP:</label>
    <input type="text" id="cep" placeholder="Ex: 54400000" maxlength="9">
    <button onclick="consultarEndereco()">Consultar</button>

    <!-- INTERFACE PROVEDORA -->
    <div id="resultado" class="resultado"></div>
  </div>

  <script>
    // COMPONENTE 1 - Serviço ViaCEP
    // INTERFACE RECEPTORA
    class ViaCepService {
      static async buscarEndereco(cep) {
        const cepLimpo = cep.replace(/\D/g, "");

        if (cepLimpo.length !== 8) {
          throw new Error("CEP inválido. Digite exatamente 8 números.");
        }

        const response = await fetch(`https://viacep.com.br/ws/${cepLimpo}/json/`);

        if (!response.ok) {
          throw new Error("Erro ao consultar a API ViaCEP.");
        }

        const data = await response.json();

        if (data.erro) {
          throw new Error("CEP não encontrado.");
        }

        return data;
      }
    }

    // COMPONENTE 2 - Regra de Negócio
    class FreteService {
      static calcularFrete(endereco) {
        const cidade = endereco.localidade?.toLowerCase();
        const uf = endereco.uf?.toUpperCase();

        if (uf === "PE" && cidade === "jaboatão dos guararapes") {
          return "Frete grátis";
        }

        if (uf === "PE") {
          return "R$ 10,00";
        }

        return "Frete não disponível";
      }
    }

    // COMPONENTE 3 - Interface com o usuário
    // INTERFACE PROVEDORA
    class UI {
      static exibirResultado(endereco, frete) {
        const resultado = document.getElementById("resultado");

        resultado.innerHTML = `
          <p><strong>CEP:</strong> ${endereco.cep}</p>
          <p><strong>Rua:</strong> ${endereco.logradouro || "Não informado"}</p>
          <p><strong>Bairro:</strong> ${endereco.bairro || "Não informado"}</p>
          <p><strong>Cidade:</strong> ${endereco.localidade}</p>
          <p><strong>UF:</strong> ${endereco.uf}</p>
          <p><strong>Frete:</strong> ${frete}</p>
        `;
      }

      static exibirErro(mensagem) {
        const resultado = document.getElementById("resultado");
        resultado.innerHTML = `<p class="erro">${mensagem}</p>`;
      }
    }

    // COMPONENTE 4 - Controlador
    async function consultarEndereco() {
      const cep = document.getElementById("cep").value;

      try {
        const endereco = await ViaCepService.buscarEndereco(cep);
        const frete = FreteService.calcularFrete(endereco);
        UI.exibirResultado(endereco, frete);
      } catch (erro) {
        UI.exibirErro(erro.message);
      }
    }
  </script>
</body>
</html>
